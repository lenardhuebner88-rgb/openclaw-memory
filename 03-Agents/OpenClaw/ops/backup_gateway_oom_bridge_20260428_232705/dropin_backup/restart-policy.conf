# Prevent rapid crash-loops + give gateway time to release resources.
# StartLimit* keys must live in [Unit] (systemd 234+), not [Service].

[Unit]
# Burst limit: max 5 restarts in 120s, then stop trying
StartLimitIntervalSec=120
StartLimitBurst=5

[Service]
# Wait 30s between restarts (was 15s) — gives old gateway time to release port + resources
RestartSec=30
