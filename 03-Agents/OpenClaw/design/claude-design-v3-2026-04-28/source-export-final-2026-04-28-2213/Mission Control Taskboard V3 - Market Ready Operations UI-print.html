<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mission Control Taskboard V3 — Print</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="mc-tokens.css"/>
<style>
  html, body {
    margin:0; padding:0;
    background:#0a0a0d;
    color:#fff;
    font-family: var(--font-sans);
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  @keyframes mc-skel {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .print-page {
    page-break-after: always;
    break-after: page;
    break-inside: avoid;
  }
  .print-page:last-child {
    page-break-after: auto;
    break-after: auto;
  }

  @page {
    size: 1600px 1000px;
    margin: 0;
  }

  @media print {
    html, body { background:#0a0a0d; }
    /* kill animations during print so the skeletons don't shimmer mid-frame */
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
    }
  }
</style>
</head>
<body>

<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="tokens.js"></script>

<script type="text/babel" src="mc-mobile-shared.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel" src="mc-v3-foundations.jsx"></script>
<script type="text/babel" src="mc-v3-drawer.jsx"></script>
<script type="text/babel" src="mc-v3a-cockpit.jsx"></script>
<script type="text/babel" src="mc-v3b-balanced.jsx"></script>
<script type="text/babel" src="mc-v3c-triage.jsx"></script>
<script type="text/babel" src="mc-v3-mobile-states.jsx"></script>
<script type="text/babel" src="mc-v3-canvas.jsx"></script>
<script type="text/babel" src="mc-v3-print.jsx"></script>

<script type="text/babel" data-presets="env,react">
  ReactDOM.createRoot(document.getElementById("app")).render(<V3Print/>);

  // Auto-print: wait for fonts + Babel, then a small grace delay.
  (async () => {
    try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch {}
    // Wait two animation frames so React paints first.
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    await new Promise(r => setTimeout(r, 600));
    window.print();
  })();
</script>
</body>
</html>
